<!DOCTYPE html>
<html>
<head>
    <title>Calculadora de Materiales</title>
</head>
<body>
    <h1>Calcular materiales para receta</h1>
    <form method="post">
        {% csrf_token %}
        <label>Receta:</label>
        <select name="recipe_id">
            {% for receta in recetas %}
            <option value="{{ receta.id }}">{{ receta.recipe_name }} (produce: {{ receta.produced_item.name }})</option>
            {% endfor %}
        </select>
        <label>Cantidad:</label>
        <input type="number" name="cantidad" value="1" min="1">
        <button type="submit">Calcular</button>
    </form>

    {% if resultado %}
        <h2>Materiales necesarios:</h2>
        <ul>
            {% for nombre, cantidad in resultado.items %}
                <li>{{ nombre }}: {{ cantidad }}</li>
            {% endfor %}
        </ul>
    {% endif %}
</body>
</html>
