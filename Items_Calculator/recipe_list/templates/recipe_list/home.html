<!DOCTYPE html>
<html>
<head>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }
        .botones {
            margin-top: 40px;
        }
        button {
            font-size: 18px;
            padding: 10px 20px;
