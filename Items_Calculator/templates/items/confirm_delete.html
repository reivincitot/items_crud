{% extends 'base.html' %}
{% block title %}Eliminar Item{% endblock %}
{% block content %}
<h1>¿Eliminar {{ item.name }}?</h1>
<p>Esta acción no se puede deshacer.</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Sí, eliminar</button>
    <a href="{% url 'item_list:list' %}">Cancelar</a>
</form>
{% endblock %}
