{% extends 'base.html' %}
{% block title %}Eliminar Item{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header bg-danger text-white">
        <h1>Eliminar Item</h1>
    </div>
    <div class="card-body">
        <p>¿Estás seguro de que deseas eliminar el item <strong>{{ item.name }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
            <a href="{% url 'item_list:list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
