{% extends 'base.html' %}
{% block content %}
<div class="card">
    <div class="card-header"><h1>Editar Item</h1></div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label>Nombre:</label>
                <input type="text" name="name" class="form-control" value="{{ item.name }}" required>
            </div>
            <div class="mb-3">
                <label>Categoría:</label>
                <div class="input-group">
                    <select name="category" class="form-select" id="id_category" required>
                        <option value="">-- seleccione --</option>
                        {% for cat in categories %}
                        <option value="{{ cat.id }}" {% if cat.id == item.category.id %}selected{% endif %}>{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                    <button type="button" class="btn btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#modalCategoria">+</button>
                </div>
            </div>
            <div class="mb-3">
                <label>Tipo:</label>
                <div class="input-group">
                    <select name="type" class="form-select" id="id_type" required>
                        <option value="">-- seleccione --</option>
                        {% for t in types %}
                        <option value="{{ t.id }}" {% if t.id == item.type.id %}selected{% endif %}>{{ t.name }}</option>
                        {% endfor %}
                    </select>
                    <button type="button" class="btn btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#modalTipo">+</button>
                </div>
            </div>
            <div class="mb-3">
                <label>Subtipo:</label>
                <div class="input-group">
                    <select name="subtype" class="form-select" id="id_subtype">
                        <option value="">-- opcional --</option>
                        {% for st in subtypes %}
                        <option value="{{ st.id }}" {% if item.subtype and st.id == item.subtype.id %}selected{% endif %}>{{ st.name }}</option>
                        {% endfor %}
                    </select>
                    <button type="button" class="btn btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#modalSubtipo">+</button>
                </div>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" name="es_fabricable" class="form-check-input" id="esFabricable" {% if item.es_fabricable %}checked{% endif %}>
                <label class="form-check-label" for="esFabricable">Este item se puede fabricar (tiene receta)</label>
            </div>
            <button type="submit" class="btn btn-primary">Guardar cambios</button>
            <a href="{% url 'item_list:list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>

<!-- Modales (iguales a create.html) -->
<div class="modal fade" id="modalCategoria" tabindex="-1">...</div>
<div class="modal fade" id="modalTipo" tabindex="-1">...</div>
<div class="modal fade" id="modalSubtipo" tabindex="-1">...</div>
<script>
    // scripts de agregar (mismos que en create.html)
</script>
{% endblock %}
