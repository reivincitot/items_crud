{% extends 'base.html' %}
{% block title %}Lista de Items{% endblock %}
{% block content %}
<h1>Items</h1>
<a href="{% url 'item_list:create' %}" class="btn btn-primary mb-3">+ Nuevo Item</a>
<ul class="list-group">
    {% for item in items %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
            {{ item.name }} ({{ item.category.name }})
            <form method="post" action="{% url 'item_list:delete' item.id %}" style="display: inline;">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('¿Eliminar {{ item.name }}?')">Eliminar</button>
            </form>
        </li>
    {% endfor %}
</ul>
{% endblock %}
