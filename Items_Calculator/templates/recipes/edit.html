{% extends 'base.html' %}
{% block content %}
<h1>Editar Receta</h1>
<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label>Nombre:</label>
        <input type="text" name="recipe_name" class="form-control" value="{{ recipe.recipe_name }}" required>
    </div>
    <div class="mb-3">
        <label>Item producido:</label>
        <select name="produced_item" class="form-select" required>
            {% for item in fabricable_items %}
            <option value="{{ item.id }}" {% if item.id == recipe.produced_item.id %}selected{% endif %}>{{ item.name }}</option>
            {% endfor %}
        </select>
    </div>
    <h3>Ingredientes</h3>
    <div id="ingredientes">
        {% for ing in recipe.ingredients.all %}
        <div class="ingrediente mb-2">
            <select name="ingredient_item_{{ forloop.counter0 }}">
                <option value="">-- seleccione --</option>
                {% for item in all_items %}
                <option value="{{ item.id }}" {% if item.id == ing.item.id %}selected{% endif %}>{{ item.name }}</option>
                {% endfor %}
            </select>
            <input type="number" name="ingredient_quantity_{{ forloop.counter0 }}" value="{{ ing.quantity }}">
        </div>
        {% endfor %}
    </div>
    <button type="button" id="agregar_ingrediente">+ Agregar ingrediente</button>
    <br><br>
    <button type="submit">Guardar cambios</button>
</form>
<script>
    let contador = {{ recipe.ingredients.count }};
    document.getElementById('agregar_ingrediente').onclick = function() {
        let div = document.createElement('div');
        div.innerHTML = `
            <select name="ingredient_item_${contador}">
                <option value="">-- seleccione --</option>
                {% for item in all_items %}
                <option value="{{ item.id }}">{{ item.name }}</option>
                {% endfor %}
            </select>
            <input type="number" name="ingredient_quantity_${contador}" placeholder="Cantidad">
        `;
        document.getElementById('ingredientes').appendChild(div);
        contador++;
    };
</script>
{% endblock %}
