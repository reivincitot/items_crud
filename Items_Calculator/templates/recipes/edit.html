{% extends 'base.html' %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h1>Editar Receta</h1>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <!-- Nombre de la receta -->
            <div class="mb-3">
                <label class="form-label">Nombre de la receta:</label>
                <input type="text" name="recipe_name" class="form-control" value="{{ recipe.recipe_name }}" required>
            </div>

            <!-- Item producido (autocompletado con el nombre actual precargado) -->
            <div class="mb-3">
                <label class="form-label">Item producido:</label>
                <input list="fabricable-items" name="produced_item_name" class="form-control" value="{{ recipe.produced_item.name }}" required>
                <datalist id="fabricable-items">
                    {% for item in fabricable_items %}
                        <option value="{{ item.name }}">
                    {% endfor %}
                </datalist>
            </div>

            <h3>Ingredientes</h3>
            <div id="ingredientes">
                {% for ing in recipe.ingredients.all %}
                <div class="ingrediente mb-2 row g-2">
                    <div class="col">
                        <input list="items-list" name="ingredient_item_{{ forloop.counter0 }}" class="form-control" value="{{ ing.item.name }}">
                    </div>
                    <div class="col-auto">
                        <input type="number" name="ingredient_quantity_{{ forloop.counter0 }}" value="{{ ing.quantity }}" class="form-control" style="width: 120px;">
                    </div>
                </div>
                {% endfor %}
            </div>
            <button type="button" id="agregar_ingrediente" class="btn btn-secondary mb-3">+ Agregar ingrediente</button>
            <br>
            <button type="submit" class="btn btn-primary">Guardar cambios</button>
            <a href="{% url 'recipe_list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>

<!-- Datalist compartido para todos los ingredientes -->
<datalist id="items-list">
    {% for item in all_items %}
        <option value="{{ item.name }}">
    {% endfor %}
</datalist>

<script>
    let contador = {{ recipe.ingredients.count }};
    document.getElementById('agregar_ingrediente').onclick = function() {
        let div = document.createElement('div');
        div.className = 'ingrediente mb-2 row g-2';
        div.innerHTML = `
            <div class="col">
                <input list="items-list" name="ingredient_item_${contador}" class="form-control" placeholder="Buscar item...">
            </div>
            <div class="col-auto">
                <input type="number" name="ingredient_quantity_${contador}" placeholder="Cantidad" step="1" min="1" class="form-control" style="width: 120px;">
            </div>
        `;
        document.getElementById('ingredientes').appendChild(div);
        contador++;
    };
</script>
{% endblock %}
